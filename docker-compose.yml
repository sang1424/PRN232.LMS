# docker-compose.yml (ở root solution)
# THAY TOÀN BỘ FILE NÀY

services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: lms_sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
             "-S", "localhost", "-U", "sa",
             "-P", "YourStrong@Passw0rd", "-C",
             "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: PRN232.LMS.API/Dockerfile
    container_name: lms_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=LmsDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      # JWT secret qua environment variable 
      - Jwt__Key=Kx7mP2vL9qR4tZ8wN5jH3sF6dA1cY0bE
      - Jwt__Issuer=PRN232.LMS.API
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver_data: