version: '3.9'

services:

  # ── SQL SERVER ─────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: lms_sqlserver

    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD",
          "/opt/mssql-tools18/bin/sqlcmd",
          "-S",
          "localhost",
          "-U",
          "sa",
          "-P",
          "YourStrong@Passw0rd",
          "-C",
          "-Q",
          "SELECT 1"
        ]

      interval: 10s
      timeout: 5s
      retries: 10

  # ── API ────────────────────────────────────
  api:

    build:
      context: .
      dockerfile: PRN232.LMS.API/Dockerfile

    container_name: lms_api

    ports:
      - "5000:8080"

    depends_on:
      db:
        condition: service_healthy

    environment:
      ConnectionStrings__DefaultConnection: >
        Server=db;
        Database=PRN232_LMS;
        User Id=sa;
        Password=YourStrong@Passw0rd;
        TrustServerCertificate=True;

# ── VOLUMES ──────────────────────────────────
volumes:
  sqlserver_data: